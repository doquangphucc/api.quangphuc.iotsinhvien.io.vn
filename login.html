<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Dòng thời gian cá nhân</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;600;700&display=swap&subset=vietnamese" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Merriweather', 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(135deg, #ff9a56 0%, #ff6b35 50%, #f7931e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background decorations */
        .bg-decoration {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            opacity: 0.1;
        }

        .bg-decoration:nth-child(1) {
            top: 10%;
            left: 10%;
            background: #fff;
            animation: float 6s ease-in-out infinite;
        }

        .bg-decoration:nth-child(2) {
            top: 60%;
            right: 10%;
            background: #fff;
            animation: float 8s ease-in-out infinite reverse;
        }

        .bg-decoration:nth-child(3) {
            bottom: 20%;
            left: 20%;
            background: #fff;
            animation: float 7s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .login-container {
            background: rgba(255, 248, 240, 0.95);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(139, 69, 19, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(231, 111, 81, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .login-title {
            color: #8b4513;
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .login-subtitle {
            color: #d2691e;
            font-size: 1rem;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-label {
            display: block;
            color: #8b4513;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(139, 69, 19, 0.2);
            border-radius: 15px;
            font-family: 'Merriweather', serif;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
            background: white;
        }

        .form-input::placeholder {
            color: #d2691e;
            opacity: 0.7;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: white;
            border: none;
            border-radius: 15px;
            font-family: 'Merriweather', serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .register-link {
            color: #d2691e;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .register-link:hover {
            color: #ff6b35;
            text-decoration: underline;
        }

        .error-message {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(220, 53, 69, 0.3);
            display: none;
        }

        .loading {
            display: none;
            color: #d2691e;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        /* Mobile responsive */
        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 30px 25px;
            }

            .login-title {
                font-size: 1.5rem;
            }

            .logo {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background decorations -->
    <div class="bg-decoration"></div>
    <div class="bg-decoration"></div>
    <div class="bg-decoration"></div>

    <div class="login-container">
        <div class="logo">🌟</div>
        <h1 class="login-title">Chào mừng trở lại!</h1>
        <p class="login-subtitle">Đăng nhập để xem dòng thời gian của bạn</p>

        <div id="error-message" class="error-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="username">Tên đăng nhập:</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    class="form-input"
                    placeholder="Nhập tên đăng nhập của bạn"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Mật khẩu:</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input"
                    placeholder="Nhập mật khẩu"
                    required
                >
            </div>

            <button type="submit" class="login-btn">Đăng nhập</button>
            
            <div class="loading" id="loading">Đang đăng nhập...</div>
        </form>

        <p>
            Chưa có tài khoản? 
            <a href="register.html" class="register-link">Đăng ký ngay</a>
        </p>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const loadingEl = document.getElementById('loading');

        // Check if already logged in
        if (localStorage.getItem('username')) {
            window.location.href = 'dashboard.html';
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Vui lòng nhập đầy đủ thông tin');
                return;
            }

            showLoading(true);
            hideError();

            try {
                const response = await fetch('api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.success) {
                    // Save username to localStorage
                    localStorage.setItem('username', username);
                    
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    showError(result.message || 'Đăng nhập thất bại');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Không thể kết nối đến server');
            } finally {
                showLoading(false);
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }

        function showLoading(show) {
            loadingEl.style.display = show ? 'block' : 'none';
            document.querySelector('.login-btn').disabled = show;
        }

        // Auto-focus username field
        document.getElementById('username').focus();
    </script>
</body>
</html>
