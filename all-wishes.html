<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tất cả đồ muốn mua - Dòng thời gian cá nhân</title>

    <!-- Custom Modal CSS -->
    <link rel="stylesheet" href="modal.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(135deg, #ff9a56 0%, #ff6b35 50%, #f7931e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animation cho lá rơi */
        .falling-leaves {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .leaf {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #f4a261;
            border-radius: 0 100% 0 100%;
            animation: fall linear infinite;
            opacity: 0.7;
        }

        .leaf:nth-child(odd) {
            background: #e76f51;
            border-radius: 100% 0 100% 0;
            transform: rotate(15deg);
        }

        @keyframes fall {
            from {
                transform: translateY(-100vh) rotate(0deg);
            }
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            z-index: 10;
            border-bottom: 2px solid rgba(233, 196, 106, 0.3);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            padding: 0 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header h1 {
            color: #8b4513;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .back-btn, .add-btn {
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .back-btn {
            background: linear-gradient(135deg, #e9c46a, #f4a261);
            color: #8b4513;
            box-shadow: 0 3px 10px rgba(233, 196, 106, 0.3);
        }

        .add-btn {
            background: linear-gradient(135deg, #f72585, #f77f00);
            color: white;
            box-shadow: 0 3px 10px rgba(247, 37, 133, 0.3);
        }

        .back-btn:hover, .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        /* Main content */
        .main-content {
            margin-top: 90px;
            padding: 20px;
            min-height: calc(100vh - 90px);
            position: relative;
            z-index: 2;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: linear-gradient(145deg, rgba(255, 248, 240, 0.95) 0%, rgba(255, 228, 196, 0.95) 100%);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(139, 69, 19, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(231, 111, 81, 0.2);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(231, 111, 81, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(233, 196, 106, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .section-title {
            text-align: center;
            color: #8b4513;
            font-size: 2rem;
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }

        .section-title .emoji {
            font-size: 2.5rem;
            margin-right: 15px;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(247, 37, 133, 0.3);
            color: #f72585;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .filter-btn.active, .filter-btn:hover {
            background: linear-gradient(135deg, #f72585, #f77f00);
            color: white;
            box-shadow: 0 3px 15px rgba(247, 37, 133, 0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            min-width: 120px;
            border: 2px solid rgba(247, 37, 133, 0.2);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #f72585;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #8b4513;
            font-size: 0.9rem;
        }

        .wishes-list {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        }

        .wish-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.15);
            border-left: 5px solid #f72585;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .wish-item.completed {
            opacity: 0.8;
            background: rgba(255, 200, 220, 0.9);
            border-left-color: #f77f00;
        }

        .wish-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.25);
        }

        .wish-header {
            margin-bottom: 15px;
        }

        .wish-title {
            font-size: 1.1rem;
            color: #8b4513;
            font-weight: 600;
            flex: 1;
            line-height: 1.4;
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            max-width: 100%;
        }

        .wish-item.completed .wish-title {
            text-decoration: line-through;
            color: #666;
        }

        .wish-price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #e76f51;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wish-price .currency {
            font-size: 1rem;
            opacity: 0.8;
        }

        .wish-meta {
            display: flex;
            flex-direction: column; /* Chia theo cột (trên dưới) */
            gap: 10px; /* Khoảng cách giữa 2 tầng */
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #d2691e;
        }

        .wish-date {
            display: flex;
            justify-content: space-between; /* Chia đôi trái phải */
            align-items: center;
            width: 100%;
        }

        .wish-date > div {
            flex: 1; /* Mỗi phần chiếm 50% */
            text-align: center; /* Căn giữa nội dung */
        }

        .wish-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 5px;
        }

        .action-btn {
            background: transparent;
            border: 2px solid #f72585;
            color: #f72585;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
        }

        .action-btn:hover {
            background: #f72585;
            color: white;
        }

        .edit-btn {
            flex: 1.5; /* Chiếm 1.5/5 phần */
        }

        .delete-btn {
            flex: 1.5; /* Chiếm 1.5/5 phần */
            background: transparent;
            border: 2px solid #e74c3c;
            color: #e74c3c;
        }

        .delete-btn:hover {
            background: #e74c3c;
            color: white;
        }

        .complete-btn {
            flex: 2; /* Chiếm 2/5 phần */
            background: #f72585;
            color: white;
            border: none;
        }

        .complete-btn:hover {
            background: #f77f00;
        }

        .edit-btn {
            background: #f77f00;
            color: white;
            border: 2px solid #f77f00;
        }

        .edit-btn:hover {
            background: #ff9500;
            border-color: #ff9500;
        }

        .wish-item.completed .complete-btn {
            background: #e76f51;
            border-color: #e76f51;
        }

        .wish-item.completed .complete-btn:hover {
            background: #f4a261;
        }

        .empty-state {
            text-align: center;
            color: #8b4513;
            font-size: 1.1rem;
            margin: 50px 0;
            position: relative;
            z-index: 2;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.7;
            color: #f72585;
        }

        .empty-state h3 {
            color: #f72585;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #d2691e;
            font-size: 1.1rem;
        }

        .loading-text {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Notification styles - Autumn theme */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 18px 25px;
            border-radius: 15px;
            color: white;
            font-family: 'Times New Roman', serif;
            font-weight: 600;
            z-index: 99999;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.1);
            opacity: 0;
            transform: translateX(100%) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 320px;
            backdrop-filter: blur(10px);
            border-left: 5px solid rgba(255,255,255,0.3);
            overflow: hidden;
        }

        .notification::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .notification.show {
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        .notification-success {
            background: linear-gradient(135deg, #e76f51 0%, #f4a261 50%, #e9c46a 100%);
            border-left-color: #e9c46a;
            box-shadow: 0 8px 25px rgba(231, 111, 81, 0.3), 0 0 0 1px rgba(233, 196, 106, 0.2);
        }

        .notification-error {
            background: linear-gradient(135deg, #d62828 0%, #f77f00 50%, #fcbf49 100%);
            border-left-color: #fcbf49;
            box-shadow: 0 8px 25px rgba(214, 40, 40, 0.3), 0 0 0 1px rgba(247, 127, 0, 0.2);
        }

        .notification-info {
            background: linear-gradient(135deg, #2a9d8f 0%, #43aa8b 50%, #90e0ef 100%);
            border-left-color: #90e0ef;
            box-shadow: 0 8px 25px rgba(42, 157, 143, 0.3), 0 0 0 1px rgba(144, 224, 239, 0.2);
        }

        .notification::after {
            content: '🍂';
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 1.2rem;
            opacity: 0.7;
            animation: gentleFloat 3s ease-in-out infinite;
        }

        .notification-success::after {
            content: '🍁';
        }

        .notification-error::after {
            content: '🍄';
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-3px) rotate(5deg); }
        }

        /* Modal xác nhận xóa wish */
        .delete-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(139, 69, 19, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .delete-modal.show {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .delete-modal-content {
            background: linear-gradient(135deg, #fff8f0 0%, #faf0e6 100%);
            padding: 40px 35px;
            border-radius: 25px;
            box-shadow: 
                0 20px 60px rgba(139, 69, 19, 0.3),
                0 0 0 1px rgba(231, 111, 81, 0.2);
            backdrop-filter: blur(15px);
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
            transform: scale(0.9);
            animation: modalIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .delete-modal-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #e74c3c;
            animation: gentleFloat 2s ease-in-out infinite;
        }

        .delete-modal-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #8b4513;
            margin-bottom: 10px;
        }

        .delete-modal-message {
            font-size: 1rem;
            color: #d2691e;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .delete-modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .delete-modal-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 15px;
            font-family: 'Times New Roman', serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 100px;
        }

        .delete-modal-btn.confirm {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .delete-modal-btn.confirm:hover {
            background: linear-gradient(135deg, #c0392b, #a93226);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        .delete-modal-btn.cancel {
            background: transparent;
            color: #8b4513;
            border: 2px solid #d2691e;
        }

        .delete-modal-btn.cancel:hover {
            background: #d2691e;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(210, 105, 30, 0.3);
        }

        @media (max-width: 480px) {
            .notification {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
                transform: translateY(-100%) scale(0.95);
            }
            
            .notification.show {
                transform: translateY(0) scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                padding: 0 20px;
            }
            
            .header h1 {
                font-size: 1.2rem;
            }
            
            .container {
                padding: 20px;
                margin: 20px;
            }
            
            .wishes-list {
                grid-template-columns: 1fr;
            }
            
            .stats {
                gap: 15px;
            }
            
            .stat-item {
                min-width: 100px;
                padding: 15px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(233, 196, 106, 0.1);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(231, 111, 81, 0.5);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(231, 111, 81, 0.7);
        }
    </style>
</head>
<body>
    <!-- Lá rơi animation -->
    <div class="falling-leaves">
        <!-- Lá sẽ được tạo bằng JavaScript -->
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1>
                <span class="emoji">🛍️</span>
                Tất cả đồ muốn mua
            </h1>
            <div class="header-actions">
                <a href="dashboard.html" class="back-btn">
                    🏠 Dashboard
                </a>
                <button class="add-btn" onclick="openAddWish()">
                    ➕ Thêm đồ
                </button>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main class="main-content">
        <div class="container">
            <!-- Filters -->
            <div class="filters">
                <button class="filter-btn active" onclick="filterWishes('all')">
                    🔍 Tất cả
                </button>
                <button class="filter-btn" onclick="filterWishes('pending')">
                    ⏳ Chưa mua
                </button>
                <button class="filter-btn" onclick="filterWishes('completed')">
                    ✅ Đã mua
                </button>
            </div>

            <!-- Stats -->
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="total-wishes">0</div>
                    <div class="stat-label">Tổng đồ</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="pending-wishes">0</div>
                    <div class="stat-label">Chưa mua</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="completed-wishes">0</div>
                    <div class="stat-label">Đã mua</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="completion-rate">0%</div>
                    <div class="stat-label">Tỷ lệ hoàn thành</div>
                </div>
            </div>

            <!-- Wishes List -->
            <div class="wishes-list" id="wishes-list">
                <div class="loading">
                    <div class="loading-text">🍂 Đang tải danh sách đồ muốn mua...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let allWishes = [];
        let currentFilter = 'all';

        // Lấy username từ URL hoặc localStorage
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('user') || localStorage.getItem('username') || 'User';

        // Helper function để lấy username
        function getUsername() {
            return localStorage.getItem('username') || urlParams.get('user') || 'User';
        }

        // Tải danh sách tất cả wishes từ API
        async function loadAllWishes() {
            try {
                const currentUsername = getUsername();
                const response = await fetch(`api/get-all-wishes.php?username=${encodeURIComponent(currentUsername)}&limit=100&sort=created_at&order=DESC`);
                const result = await response.json();
                
                console.log('API Response:', result); // Debug log
                
                if (result.success) {
                    allWishes = (result.data || []).filter((w,i,self)=> self.findIndex(x=>x.id==w.id)===i);
                    console.log('Loaded wishes:', allWishes); // Debug log
                    displayWishes();
                    updateStats();
                } else {
                    console.error('Error loading wishes:', result.message);
                    showEmptyState('Có lỗi xảy ra khi tải danh sách đồ muốn mua');
                }
            } catch (error) {
                console.error('Error loading wishes:', error);
                showEmptyState('Không thể kết nối đến server');
            }
        }

        // Hiển thị danh sách wishes
        function displayWishes() {
            const wishesList = document.getElementById('wishes-list');
            if (!wishesList) return;
            
            let filteredWishes = allWishes;
            if (currentFilter === 'pending') {
                filteredWishes = allWishes.filter(wish => !wish.is_completed);
            } else if (currentFilter === 'completed') {
                filteredWishes = allWishes.filter(wish => wish.is_completed);
            }

            if (filteredWishes.length === 0) {
                let emptyMessage = '';
                if (currentFilter === 'all') {
                    emptyMessage = 'Bạn chưa có đồ nào muốn mua. Hãy thêm món đầu tiên!';
                } else if (currentFilter === 'pending') {
                    emptyMessage = 'Không có đồ nào cần mua. Tiết kiệm tốt! 🎉';
                } else {
                    emptyMessage = 'Bạn chưa mua đồ nào. Hãy thực hiện ước mơ! 🛒';
                }
                showEmptyState(emptyMessage);
                return;
            }

            let wishesHTML = '';
            filteredWishes.forEach(wish => {
                const completedClass = wish.is_completed ? 'completed' : '';
                const statusText = wish.is_completed ? 'Đã mua' : 'Chưa mua';
                const actionText = wish.is_completed ? 'Chưa mua' : 'Đã mua';
                const actionIcon = wish.is_completed ? '↩️' : '🛒';
                
                const createdDate = new Date(wish.created_at).toLocaleDateString('vi-VN');
                const scheduledDate = wish.scheduled_date ? new Date(wish.scheduled_date).toLocaleDateString('vi-VN') : null;

                // Format price if available
                const priceHTML = wish.price ? `
                    <div class="wish-price">
                        💰 ${formatPrice(wish.price)}
                    </div>
                ` : '';

                wishesHTML += `
                    <div class="wish-item ${completedClass}">
                        <div class="wish-header">
                            <div class="wish-title">${escapeHtml(wish.title)}</div>
                        </div>
                        ${priceHTML}
                        <div class="wish-meta">
                            <div class="wish-date">
                                <div>📅 Tạo: ${createdDate}</div>
                                <div>${scheduledDate ? `⏰ Hạn: ${scheduledDate}` : '⏰ Không có hạn'}</div>
                            </div>
                            <div class="wish-actions">
                                <button class="action-btn edit-btn" onclick="editWish(${wish.id})" 
                                        title="Sửa đồ này">
                                    ✏️ Sửa
                                </button>
                                <button class="action-btn delete-btn" onclick="deleteWish(${wish.id})" 
                                        title="Xóa đồ này">
                                    🗑️ Xóa
                                </button>
                                <button class="action-btn complete-btn" onclick="toggleComplete(${wish.id})" 
                                        title="${actionText}">
                                    ${actionIcon} ${actionText}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });

            wishesList.innerHTML = wishesHTML;
        }

        // Cập nhật thống kê
        function updateStats() {
            const totalWishes = allWishes.length;
            const completedWishes = allWishes.filter(wish => wish.is_completed).length;
            const pendingWishes = totalWishes - completedWishes;
            const completionRate = totalWishes > 0 ? Math.round((completedWishes / totalWishes) * 100) : 0;

            const totalWishesEl = document.getElementById('total-wishes');
            const pendingWishesEl = document.getElementById('pending-wishes');
            const completedWishesEl = document.getElementById('completed-wishes');
            const completionRateEl = document.getElementById('completion-rate');
            
            if (totalWishesEl) totalWishesEl.textContent = totalWishes;
            if (pendingWishesEl) pendingWishesEl.textContent = pendingWishes;
            if (completedWishesEl) completedWishesEl.textContent = completedWishes;
            if (completionRateEl) completionRateEl.textContent = completionRate + '%';
        }

        // Hiển thị trạng thái rỗng
        function showEmptyState(message) {
            const wishesList = document.getElementById('wishes-list');
            if (!wishesList) return;
            wishesList.innerHTML = `
                <div class="empty-state">
                    <div class="icon">🛍️</div>
                    <h3>Danh sách trống</h3>
                    <p>${message}</p>
                </div>
            `;
        }

        // Lọc wishes
        function filterWishes(filter) {
            currentFilter = filter;
            
            // Cập nhật active state cho buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            displayWishes();
        }

        // Edit wish function
        async function editWish(wishId) {
            try {
                console.log(`Editing wish with ID: ${wishId}`);
                
                // Lấy dữ liệu wish hiện tại từ API
                const username = getUsername();
                const response = await fetch(`api/get-wish-by-id.php?id=${wishId}&username=${encodeURIComponent(username)}`);
                const result = await response.json();
                
                if (!result.success || !result.data || result.data.length === 0) {
                    throw new Error('Không tìm thấy đồ này');
                }
                
                const wishData = result.data[0];
                console.log('Wish data for edit:', wishData);
                
                // Chuẩn bị data cho modal
                const modalData = {
                    content: wishData.title,
                    description: wishData.description || '',
                    scheduled_date: wishData.scheduled_date,
                    scheduled_time: wishData.scheduled_time,
                    price: wishData.price || ''
                };
                
                // Mở modal edit với callback update
                showEditWishModal(modalData, async (updatedData) => {
                    try {
                        // Gọi API update
                        const requestData = {
                            id: wishId,
                            title: updatedData.content,
                            description: updatedData.description,
                            scheduled_date: updatedData.scheduled_date,
                            scheduled_time: updatedData.scheduled_time,
                            price: updatedData.price
                        };
                        
                        console.log('Sending update request:', requestData);
                        
                        const updateResponse = await fetch('api/update-wish.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(requestData)
                        });
                        
                        const updateResult = await updateResponse.json();
                        
                        if (updateResult.success) {
                            // Refresh danh sách wishes
                            loadAllWishes();
                            showNotification('✅ Cập nhật đồ thành công!', 'success');
                        } else {
                            throw new Error(updateResult.message || 'Cập nhật thất bại');
                        }
                        
                    } catch (error) {
                        console.error('Update error:', error);
                        showNotification(`❌ Lỗi cập nhật: ${error.message}`, 'error');
                    }
                });
                
            } catch (error) {
                console.error('Edit error:', error);
                showNotification(`❌ Lỗi: ${error.message}`, 'error');
            }
        }

        // Toggle trạng thái hoàn thành
        async function toggleComplete(wishId) {
            try {
                const res = await fetch('api/toggle-complete.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'wish', id: wishId })
                });
                const json = await res.json();
                if (!json.success) throw new Error(json.message || 'Toggle failed');
                const idx = allWishes.findIndex(w => w.id == wishId);
                if (idx !== -1) {
                    allWishes[idx].is_completed = json.is_completed;
                    allWishes[idx].updated_at = new Date().toISOString();
                }
                displayWishes();
                updateStats();
            } catch (e) {
                console.error(e);
                showNotification('❌ Có lỗi xảy ra khi cập nhật', 'error');
            }
        }

        // Global variable để lưu wishId cần xóa
        let pendingDeleteWishId = null;

        // Hiển thị modal xác nhận xóa wish
        function deleteWish(wishId) {
            pendingDeleteWishId = wishId;
            const modal = document.getElementById('deleteWishModal');
            if (modal) {
                modal.classList.add('show');
            }
        }

        // Ẩn modal xác nhận xóa wish
        function hideDeleteWishModal() {
            const modal = document.getElementById('deleteWishModal');
            if (modal) {
                modal.classList.remove('show');
            }
            pendingDeleteWishId = null;
        }

        // Xác nhận xóa wish - thực hiện xóa thật
        async function confirmDeleteWish() {
            if (!pendingDeleteWishId) return;
            
            const wishId = pendingDeleteWishId;
            hideDeleteWishModal();
            
            try {
                const res = await fetch('api/delete-item.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'wish', id: wishId })
                });
                const json = await res.json();
                if (!json.success) throw new Error(json.message || 'Delete failed');
                
                // Xóa khỏi mảng local
                const idx = allWishes.findIndex(w => w.id == wishId);
                if (idx !== -1) {
                    allWishes.splice(idx, 1);
                }
                displayWishes();
                updateStats();
                showNotification('✅ Đã xóa đồ thành công', 'success');
            } catch (e) {
                console.error(e);
                showNotification('❌ Có lỗi xảy ra khi xóa', 'error');
            }
        }

        // Thêm wish mới
        function openAddWish() {
            showWishModal(function(data) {
                addWish(data.content, data.datetime, data.price);
            });
        }

        async function addWish(title, datetime = null, price = null) {
            try {
                const requestBody = { 
                    username: getUsername(),
                    title: title 
                };
                
                // Thêm datetime nếu có
                if (datetime) {
                    requestBody.datetime = datetime;
                }
                
                // Thêm price nếu có
                if (price && !isNaN(price)) {
                    requestBody.price = parseFloat(price);
                }

                const response = await fetch('api/add-wish.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody)
                });

                const result = await response.json();
                
                if (result.success) {
                    // Reload danh sách wishes
                    await loadAllWishes();
                    showNotification('✅ Thêm đồ thành công!', 'success');
                } else {
                    showNotification('❌ Có lỗi xảy ra: ' + (result.message || 'Không thể thêm đồ'), 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('❌ Có lỗi xảy ra khi thêm đồ', 'error');
            }
        }

        // Format giá tiền
        function formatPrice(price) {
            if (!price) return '';
            return parseInt(price).toLocaleString('vi-VN') + ' đ';
        }

        // Escape HTML để tránh XSS
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Tạo lá rơi animation
        function createFallingLeaf() {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            
            leaf.style.left = Math.random() * 100 + '%';
            const fallDuration = Math.random() * 3 + 4;
            leaf.style.animationDuration = fallDuration + 's';
            leaf.style.animationDelay = Math.random() * 2 + 's';
            
            const fallingLeaves = document.querySelector('.falling-leaves');
            if (fallingLeaves) {
                fallingLeaves.appendChild(leaf);
            }
            
            setTimeout(() => {
                leaf.remove();
            }, (fallDuration + 2) * 1000);
        }

        function startFallingLeaves() {
            setInterval(createFallingLeaf, 300);
        }

        // Hàm hiển thị thông báo đẹp theo phong cách mùa thu
        function showNotification(message, type = 'info') {
            // Xóa notification cũ nếu có
            const existingNotification = document.querySelector('.notification');
            if (existingNotification) {
                existingNotification.remove();
            }
            
            // Tạo notification element
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            // Animate in với delay nhỏ để CSS có thể apply
            setTimeout(() => {
                notification.classList.add('show');
            }, 50);
            
            // Auto remove after 4 seconds
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 400);
            }, 4000);
        }

        // Khởi tạo khi trang load
        document.addEventListener('DOMContentLoaded', function() {
            loadAllWishes();
            startFallingLeaves();
            
            // Tạo lá ban đầu
            for (let i = 0; i < 10; i++) {
                setTimeout(createFallingLeaf, i * 200);
            }
        });

        // Event listeners cho modal delete wish
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                hideDeleteWishModal();
            }
        });

        // Click bên ngoài để đóng modal - chờ DOM load
        document.addEventListener('DOMContentLoaded', function() {
            const deleteModal = document.getElementById('deleteWishModal');
            if (deleteModal) {
                deleteModal.addEventListener('click', function(e) {
                    if (e.target === this) {
                        hideDeleteWishModal();
                    }
                });
            }
        });
    </script>

    <!-- Modal xác nhận xóa wish -->
    <div id="deleteWishModal" class="delete-modal">
        <div class="delete-modal-content">
            <div class="delete-modal-icon">🍂</div>
            <h3 class="delete-modal-title">Xác nhận xóa wish</h3>
            <p class="delete-modal-message">Bạn có chắc chắn muốn xóa wish này? Hành động này không thể hoàn tác.</p>
            <div class="delete-modal-buttons">
                <button class="delete-modal-btn cancel" onclick="hideDeleteWishModal()">Hủy</button>
                <button class="delete-modal-btn confirm" onclick="confirmDeleteWish()">Xóa</button>
            </div>
        </div>
    </div>

    <!-- Custom Modal Script -->
    <script src="modal.js"></script>
</body>
</html>
