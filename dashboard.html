<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Dòng thời gian cá nhân</title>
    <!-- Font web hỗ trợ tiếng Việt -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;600;700&display=swap&subset=vietnamese" rel="stylesheet">
    <!-- Custom Modal CSS -->
    <link rel="stylesheet" href="modal.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Merriweather', 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(135deg, #ff9a56 0%, #ff6b35 50%, #f7931e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animation cho lá rơi */
        .falling-leaves {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .leaf {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #f4a261;
            border-radius: 0 100% 0 100%;
            animation: fall linear infinite;
            opacity: 0.7;
        }

        .leaf:nth-child(odd) {
            background: #e76f51;
            border-radius: 100% 0 100% 0;
            transform: rotate(15deg);
        }

        .leaf:nth-child(3n) {
            background: #e9c46a;
            width: 15px;
            height: 15px;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Header cố định */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
            border-bottom: 2px solid rgba(233, 196, 106, 0.3);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .welcome {
            font-size: 1.5rem;
            color: #8b4513;
            font-weight: 600;
        }

        .logout-btn {
            background: linear-gradient(135deg, #e76f51, #f4a261);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 111, 81, 0.4);
        }

        /* Modal đăng xuất */
        .logout-modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logout-modal-content {
            position: relative;
            background: linear-gradient(145deg, #fff 0%, #fef7f0 100%);
            padding: 35px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 90%;
            text-align: center;
            font-family: 'Merriweather', 'Georgia', 'Times New Roman', serif;
            border: 2px solid rgba(231, 111, 81, 0.2);
            animation: modalSlideIn 0.3s ease-out;
            margin: auto;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logout-modal-content h3 {
            color: #e76f51;
            margin-bottom: 15px;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .logout-modal-content p {
            color: #8b4513;
            margin-bottom: 25px;
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .logout-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-logout-confirm,
        .btn-logout-cancel {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 130px;
            font-family: 'Merriweather', serif;
        }

        .btn-logout-confirm {
            background: linear-gradient(135deg, #e76f51, #f4a261);
            color: white;
            box-shadow: 0 5px 15px rgba(231, 111, 81, 0.3);
        }

        .btn-logout-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(231, 111, 81, 0.4);
        }

        .btn-logout-cancel {
            background: linear-gradient(135deg, #e9c46a, #f4a261);
            color: #8b4513;
            box-shadow: 0 5px 15px rgba(233, 196, 106, 0.3);
        }

        .btn-logout-cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 196, 106, 0.4);
        }

        @media (max-width: 480px) {
            .logout-modal-content {
                padding: 25px 20px;
                margin: 20px;
            }
            
            .logout-buttons {
                flex-direction: column;
            }
            
            .btn-logout-confirm,
            .btn-logout-cancel {
                width: 100%;
            }
        }

        /* Sidebar cố định */
        .sidebar {
            position: fixed;
            left: 0;
            top: 70px; /* Cách header */
            width: 280px;
            height: calc(100vh - 70px);
            background: linear-gradient(180deg, 
                rgba(255, 248, 240, 0.95) 0%, 
                rgba(255, 235, 205, 0.95) 50%, 
                rgba(255, 218, 185, 0.95) 100%);
            backdrop-filter: blur(15px);
            box-shadow: 2px 0 20px rgba(139, 69, 19, 0.15);
            z-index: 50;
            overflow-y: auto;
            padding: 20px;
            border-right: 2px solid rgba(231, 111, 81, 0.2);
        }

        .sidebar h3 {
            color: #8b4513;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.2rem;
        }

        .action-btn {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-add-task {
            background: linear-gradient(135deg, #e9c46a, #f4a261);
            color: #8b4513;
            box-shadow: 0 3px 10px rgba(233, 196, 106, 0.3);
        }

        .btn-add-wish {
            background: linear-gradient(135deg, #e76f51, #f4a261);
            color: white;
            box-shadow: 0 3px 10px rgba(231, 111, 81, 0.3);
        }

        .btn-view-tasks {
            background: linear-gradient(135deg, #2a9d8f, #43aa8b);
            color: white;
            box-shadow: 0 3px 10px rgba(42, 157, 143, 0.3);
        }

        .btn-view-wishes {
            background: linear-gradient(135deg, #f72585, #f77f00);
            color: white;
            box-shadow: 0 3px 10px rgba(247, 37, 133, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .sidebar-section {
            margin-bottom: 30px;
        }

        .sidebar-section h4 {
            color: #8b4513;
            font-size: 1rem;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(139, 69, 19, 0.2);
            padding-bottom: 5px;
        }

        .item-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .list-item {
            background: rgba(233, 196, 106, 0.1);
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 3px solid #e76f51;
            font-size: 0.85rem;
            color: #8b4513;
        }

        .list-item .date {
            font-size: 0.75rem;
            color: #d2691e;
            opacity: 0.8;
        }

        /* Main content */
        .main-content {
            margin: 0;                 /* bỏ margin trùng gây thu hẹp */
            padding: 0 40px 0 8px;     /* chừa rất ít cam bên trái, khoảng nhỏ bên phải */
            height: calc(100vh - 70px);
            position: fixed;           /* pin */
            top: 70px;                 /* dưới header */
            left: 280px;               /* bắt đầu ngay sau sidebar */
            right: 0;
            z-index: 2;
            overflow: hidden;
            display: flex;
            box-sizing: border-box;
        }

        .content-area {
            background: linear-gradient(145deg, #fff9f3 0%, #ffe6cc 100%);
            border-radius: 26px; 
            padding: 40px 50px 45px 50px;
            height: 100%;
            width: 100%;                 /* chiếm toàn bộ chiều ngang main-content */
            box-shadow: 0 15px 35px rgba(139, 69, 19, 0.22), 0 0 0 1px rgba(231,111,81,0.10);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(231, 111, 81, 0.35);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .content-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(231, 111, 81, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(233, 196, 106, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(244, 162, 97, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .content-area::after {
            content: '🍂 🍁 🌰 🍂 🍁 🌰 🍂 🍁 🌰';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            font-size: 1.5rem;
            opacity: 0.3;
            text-align: center;
            pointer-events: none;
            z-index: 1;
            animation: gentleFloat 6s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .empty-state {
            text-align: center;
            color: #8b4513;
            font-size: 1.1rem;
            margin-top: 100px;
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.7;
            color: #e76f51;
        }

        .empty-state h2 {
            color: #e76f51;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        .empty-state p {
            color: #d2691e;
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Cây tre timeline */
        .bamboo-timeline {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            flex: 1;
            overflow: hidden;
            padding: 10px;
            width: 100%;
            height: 100%;
        }

        .bamboo-scroll-container {
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            width: 100%;
            padding: 20px 20px 40px 20px; /* Tăng padding bottom để có không gian cuộn */
            flex: 1;
        }

        .bamboo-scroll-container::-webkit-scrollbar {
            width: 6px;
        }

        .bamboo-scroll-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        .bamboo-scroll-container::-webkit-scrollbar-thumb {
            background: rgba(231, 111, 81, 0.5);
            border-radius: 3px;
        }

        .bamboo-scroll-container::-webkit-scrollbar-thumb:hover {
            background: rgba(231, 111, 81, 0.7);
        }

        .bamboo-tree {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .bamboo-root {
            text-align: center;
            margin-bottom: 15px;
            position: relative;
            flex-shrink: 0;
            width: 100%;
            padding: 0 20px;
        }

        .current-time {
            background: linear-gradient(135deg, #e76f51, #f4a261);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1.3rem;
            box-shadow: 0 5px 15px rgba(231, 111, 81, 0.3);
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .root-decoration {
            font-size: 1.5rem;
            animation: sway 3s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .bamboo-trunk {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 30px;
            padding-top: 40px; /* Thêm padding để ô đầu tiên không bị che */
        }

        .bamboo-trunk::before {
            content: '';
            position: absolute;
            left: 50%;
            top: -10px;
            bottom: -10px;
            width: 8px;
            background: linear-gradient(180deg, #d4a574 0%, #c4955a 50%, #b8894a 100%);
            transform: translateX(-50%);
            border-radius: 4px;
            box-shadow: inset 0 0 5px rgba(139, 69, 19, 0.3);
        }

        .bamboo-node {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            z-index: 2;
            width: 100%;
        }

        .bamboo-node::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #e9c46a, #f4a261);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border: 3px solid #d4a574;
            box-shadow: 0 3px 10px rgba(139, 69, 19, 0.2);
        }

        .bamboo-node.today::before {
            background: linear-gradient(135deg, #e76f51, #f4a261);
            width: 25px;
            height: 25px;
            animation: todayPulse 2s infinite;
        }

        .bamboo-node.future::before {
            background: linear-gradient(135deg, #2a9d8f, #43aa8b);
            width: 22px;
            height: 22px;
            animation: futurePulse 3s infinite;
        }

        @keyframes futurePulse {
            0%, 100% { box-shadow: 0 3px 10px rgba(139, 69, 19, 0.2); }
            50% { box-shadow: 0 5px 20px rgba(42, 157, 143, 0.5); }
        }

        .bamboo-loading {
            text-align: center;
            padding: 30px 20px;
            color: #d2691e;
            opacity: 0.7;
        }

        .loading-text {
            font-size: 1rem;
            animation: loadingFloat 2s ease-in-out infinite;
        }

        @keyframes loadingFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes todayPulse {
            0%, 100% { box-shadow: 0 3px 10px rgba(139, 69, 19, 0.2); }
            50% { box-shadow: 0 5px 20px rgba(231, 111, 81, 0.5); }
        }

        .node-date {
            position: absolute;
            left: 50%;
            top: -15px;
            transform: translateX(-50%);
            background: rgba(255, 248, 240, 0.9);
            color: #8b4513;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(231, 111, 81, 0.3);
        }

        .node-branches {
            display: flex;
            width: 100%;
            justify-content: center;
            align-items: center;
            gap: 80px;
            padding: 0 40px;
        }

        .task-branch {
            position: relative;
            flex: 1;
            min-width: 500px;
            max-width: 800px;
            text-align: right;
        }

        .wish-branch {
            position: relative;
            flex: 1;
            min-width: 500px;
            max-width: 800px;
            text-align: left;
        }

        .branch-content {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 3px 10px rgba(139, 69, 19, 0.15);
            border: 1px solid rgba(231, 111, 81, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 1rem;
            max-width: 640px; /* Tăng chiều rộng tối đa */
            width: auto;
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
        }

        .branch-content.completed {
            opacity: 0.7;
            background: rgba(200, 200, 200, 0.8);
        }

        .branch-item {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Trở lại space-between để nút tick căn giữa */
            gap: 2%; /* Gap tổng 2% để tạo khoảng cách */
            padding: 5px 1% 5px 1%; /* Padding trái phải mỗi bên 1% */
            min-height: 32px; /* Đảm bảo chiều cao tối thiểu */
            width: 100%; /* Đảm bảo sử dụng hết chiều rộng */
            box-sizing: border-box;
        }

        .branch-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1; /* Chiếm 1 phần trong layout flex */
            justify-content: center; /* Căn giữa nút tick */
            max-width: 8%; /* Tối đa 8% để có khoảng cách */
        }

        /* CSS cho edit-btn đã được loại bỏ vì edit chuyển sang all-tasks.html và all-wishes.html */

        .tick-btn {
            background: rgba(42, 157, 143, 0.8);
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            color: white;
            flex-shrink: 0;
        }

        .tick-btn:hover {
            background: rgba(42, 157, 143, 1);
            transform: scale(1.1);
        }

        .branch-item.completed .branch-text {
            text-decoration: line-through;
            color: #888;
        }

        .branch-item.empty {
            color: #999;
            font-style: italic;
            justify-content: center;
        }

        .branch-content.completed .tick-btn {
            background: rgba(231, 111, 81, 0.8);
        }

        .branch-content.completed .tick-btn:hover {
            background: rgba(231, 111, 81, 1);
        }

        .tick-icon {
            font-weight: bold;
            font-size: 12px;
        }

        .task-branch .branch-content {
            margin-right: 60px;
            border-left: 4px solid #2a9d8f;
            max-width: 700px; /* Tăng chiều rộng cho task */
        }

        .wish-branch .branch-content {
            margin-left: 60px;
            border-left: 4px solid #f72585;
            max-width: 700px; /* Tăng chiều rộng cho wish */
        }

        /* Khi hiển thị đơn lẻ, không cần margin */
        .node-branches .task-branch:only-child .branch-content {
            margin-right: 0;
        }

        .node-branches .wish-branch:only-child .branch-content {
            margin-left: 0;
        }

        .branch-content:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.25);
        }

        .branch-text {
            font-size: 1rem;
            color: #8b4513;
            font-weight: 500;
            line-height: 1.4;
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            flex: 9; /* Chiếm 9 phần trong layout flex */
            max-width: 88%; /* Tối đa 88% để có khoảng cách */
            text-align: right; /* Căn phải cho nội dung text */
        }

        .loading-indicator {
            text-align: center;
            padding: 20px;
            color: #d2691e;
            font-style: italic;
        }

        .loading-text {
            font-size: 1rem;
            animation: loadingPulse 1.5s infinite;
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Notification styles - Autumn theme */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 18px 25px;
            border-radius: 15px;
            color: white;
            font-family: 'Merriweather', serif;
            font-weight: 600;
            z-index: 99999;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.1);
            opacity: 0;
            transform: translateX(100%) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 320px;
            backdrop-filter: blur(10px);
            border-left: 5px solid rgba(255,255,255,0.3);
            overflow: hidden;
        }

        .notification::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .notification.show {
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        .notification-success {
            background: linear-gradient(135deg, #e76f51 0%, #f4a261 50%, #e9c46a 100%);
            border-left-color: #e9c46a;
            box-shadow: 0 8px 25px rgba(231, 111, 81, 0.3), 0 0 0 1px rgba(233, 196, 106, 0.2);
        }

        .notification-error {
            background: linear-gradient(135deg, #d62828 0%, #f77f00 50%, #fcbf49 100%);
            border-left-color: #fcbf49;
            box-shadow: 0 8px 25px rgba(214, 40, 40, 0.3), 0 0 0 1px rgba(247, 127, 0, 0.2);
        }

        .notification-info {
            background: linear-gradient(135deg, #2a9d8f 0%, #43aa8b 50%, #90e0ef 100%);
            border-left-color: #90e0ef;

    <script>
        // Check authentication
        function checkAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('user') || localStorage.getItem('username');
            
            if (!username) {
                // Redirect to login if not authenticated
                window.location.href = 'login.html';
                return null;
            }
            
            return username;
        }

        // Initialize authentication
        const username = checkAuth();
        if (!username) {
            // Stop script execution if not authenticated
            throw new Error('Authentication required');
        }
        
        // Hiển thị display_name thay vì username
        const displayName = localStorage.getItem('display_name') || username;
        document.getElementById('display-name').textContent = displayName;

        // Helper function để lấy username
        function getUsername() {
            return localStorage.getItem('username') || urlParams.get('user') || 'quangphuc2k3';
        }

        // Cập nhật thời gian hiện tại
        function updateCurrentTime() {
            const now = new Date();
            const options = {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            const timeString = now.toLocaleDateString('vi-VN', options);
            const currentTimeElement = document.getElementById('current-time');
            if (currentTimeElement) {
                currentTimeElement.textContent = timeString;
            }
        }

        // Cập nhật thời gian mỗi giây
        setInterval(updateCurrentTime, 1000);
        updateCurrentTime(); // Gọi ngay lập tức

        // Dữ liệu timeline từ API
        let timelineData = {};
        let timelineRange = { minDate: null, maxDate: null }; // Khoảng thời gian có dữ liệu
        let isLoading = false;

        // Tải dữ liệu timeline từ API
        async function loadTimelineData() {
            try {
                const username = getUsername();
                // Lấy tất cả dữ liệu có sẵn (30 ngày gần nhất)
                const response = await fetch(`api/get-timeline-data.php?username=${encodeURIComponent(username)}&days=30&limit=100`);
                const result = await response.json();
                
                console.log('Timeline API Response:', result); // Debug log
                
                if (result.success) {
                    console.log('Raw API data items:', result.data); // Debug raw data
                    
                    // Lưu khoảng thời gian có dữ liệu thực tế
                    timelineRange.minDate = result.stats.actual_min_date;
                    timelineRange.maxDate = result.stats.actual_max_date;
                    console.log('Actual data range:', timelineRange);
                    
                    // Chuyển đổi data từ API mới sang format cũ để tương thích
                    const convertedData = {};
                    result.data.forEach(item => {
                        console.log('Processing item:', item); // Debug each item
                        const date = item.date_only || (item.timestamp ? item.timestamp.split('T')[0] : null);
                        if (!date) {
                            console.warn('Item without valid date:', item);
                            return; // Skip items without valid date
                        }
                        
                        // Tạo key duy nhất cho mỗi item bao gồm cả thời gian
                        const itemKey = `${item.type}_${item.id}_${item.timestamp || date}`;
                        
                        convertedData[itemKey] = {
                            date: date,
                            timestamp: item.timestamp,
                            time_formatted: item.time_formatted,
                            scheduled_date: item.scheduled_date,
                            scheduled_time: item.scheduled_time,
                            type: item.type,
                            id: item.id,
                            title: item.title,
                            is_completed: item.is_completed,
                            price: item.price || null
                        };
                    });
                    
                    console.log('Converted data:', convertedData); // Debug converted data
                    
                    // Lưu dữ liệu vào cache - sử dụng scheduled_date+time làm key ưu tiên
                    Object.values(convertedData).forEach(itemData => {
                        let cacheKey;
                        if (itemData.scheduled_date && itemData.scheduled_time) {
                            cacheKey = `${itemData.scheduled_date}T${itemData.scheduled_time}`;
                        } else if (itemData.scheduled_date) {
                            cacheKey = `${itemData.scheduled_date}T00:00:00`;
                        } else {
                            cacheKey = itemData.timestamp || itemData.date;
                        }
                        timelineData[cacheKey] = itemData;
                    });
                    console.log('Timeline data cached:', timelineData); // Debug log
                    return Object.values(convertedData);
                } else {
                    console.error('Error loading timeline data:', result.message);
                    return [];
                }
            } catch (error) {
                console.error('Error loading timeline data:', error);
                return [];
            }
        }

        // Tạo một đốt tre cho một item cụ thể (task hoặc wish)
        function createBambooNode(itemData) {
            if (!itemData) return '';
            
            // Sử dụng scheduled_date và scheduled_time thay vì timestamp
            let scheduledDateTime;
            if (itemData.scheduled_date && itemData.scheduled_time) {
                // Kết hợp scheduled_date và scheduled_time
                scheduledDateTime = new Date(`${itemData.scheduled_date}T${itemData.scheduled_time}`);
            } else if (itemData.scheduled_date) {
                // Chỉ có scheduled_date, set thời gian mặc định là 00:00
                scheduledDateTime = new Date(`${itemData.scheduled_date}T00:00:00`);
            } else {
                // Fallback về created_at nếu không có scheduled
                scheduledDateTime = new Date(itemData.timestamp || itemData.date);
            }
            
            const today = new Date();
            const daysFromToday = Math.floor((scheduledDateTime - today) / (1000 * 60 * 60 * 24));
            
            // Format ngày theo scheduled_date
            const dateFormatted = scheduledDateTime.toLocaleDateString('vi-VN', {
                day: '2-digit',
                month: '2-digit', 
                year: 'numeric'
            });
            
            // Format giờ theo scheduled_time
            const timeFormatted = scheduledDateTime.toLocaleTimeString('vi-VN', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
            
            const dateLabel = `${dateFormatted} ${timeFormatted}`;

            const nodeClass = daysFromToday === 0 ? 'today' : 
                             daysFromToday > 0 ? 'future' : '';

            const completedClass = itemData.is_completed ? 'completed' : '';
            const priceText = itemData.price ? ` (${formatPrice(itemData.price)})` : '';
            
            // Tạo HTML cho item dựa trên loại
            let itemHTML = '';
            let branchClass = '';
            let emptyBranchHTML = '<div class="branch-content"></div>';
            
            if (itemData.type === 'task') {
                branchClass = 'task-branch';
                itemHTML = `
                    <div class="branch-item ${completedClass}" data-type="task" data-id="${itemData.id}">
                        <span class="branch-text">${itemData.title}</span>
                        <div class="branch-actions">
                            <button class="tick-btn" onclick="toggleComplete('task', ${itemData.id})" 
                                    title="${itemData.is_completed ? 'Đánh dấu chưa hoàn thành' : 'Đánh dấu hoàn thành'}">
                                ${itemData.is_completed ? '✅' : '⭕'}
                            </button>
                        </div>
                    </div>
                `;
            } else {
                branchClass = 'wish-branch';
                itemHTML = `
                    <div class="branch-item ${completedClass}" data-type="wish" data-id="${itemData.id}">
                        <span class="branch-text">${itemData.title}${priceText}</span>
                        <div class="branch-actions">
                            <button class="tick-btn" onclick="toggleComplete('wish', ${itemData.id})"
                                    title="${itemData.is_completed ? 'Đánh dấu chưa mua' : 'Đánh dấu đã mua'}">
                                ${itemData.is_completed ? '✅' : '⭕'}
                            </button>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="bamboo-node ${nodeClass}">
                    <div class="node-date">${dateLabel}</div>
                    <div class="node-branches">
                        ${itemData.type === 'task' ? `
                            <div class="branch-left task-branch">
                                <div class="branch-content">
                                    ${itemHTML}
                                </div>
                            </div>
                        ` : `
                            <div class="branch-right wish-branch">
                                <div class="branch-content">
                                    ${itemHTML}
                                </div>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        // Tạo nodes dựa trên từng item riêng lẻ
        async function initializeBambooNodes() {
            const trunkElement = document.getElementById('bamboo-trunk');
            const loadingElement = document.getElementById('loading');
            
            try {
                // Load dữ liệu timeline từ API
                await loadTimelineData();
                
                // Chỉ hiển thị các item có dữ liệu thực tế
                let nodesHTML = '';
                
                if (Object.keys(timelineData).length > 0) {
                    // Sắp xếp các items theo scheduled_date + scheduled_time tăng dần (gần nhất trên, xa nhất dưới)
                    const sortedItems = Object.values(timelineData).sort((a, b) => {
                        // Tạo DateTime từ scheduled_date và scheduled_time
                        let dateA, dateB;
                        
                        if (a.scheduled_date && a.scheduled_time) {
                            dateA = new Date(`${a.scheduled_date}T${a.scheduled_time}`);
                        } else if (a.scheduled_date) {
                            dateA = new Date(`${a.scheduled_date}T00:00:00`);
                        } else {
                            dateA = new Date(a.timestamp || a.date);
                        }
                        
                        if (b.scheduled_date && b.scheduled_time) {
                            dateB = new Date(`${b.scheduled_date}T${b.scheduled_time}`);
                        } else if (b.scheduled_date) {
                            dateB = new Date(`${b.scheduled_date}T00:00:00`);
                        } else {
                            dateB = new Date(b.timestamp || b.date);
                        }
                        
                        // Sắp xếp tăng dần theo thời gian scheduled (gần nhất trước)
                        return dateA - dateB;
                    });
                    
                    console.log('Sorted items by scheduled time (ASC):', sortedItems.map(item => ({
                        title: item.title,
                        scheduled_date: item.scheduled_date,
                        scheduled_time: item.scheduled_time
                    })));
                    
                    for (const itemData of sortedItems) {
                        console.log(`Creating node for item:`, itemData);
                        
                        const nodeHTML = createBambooNode(itemData);
                        if (nodeHTML) nodesHTML += nodeHTML;
                    }
                    
                    console.log('Generated nodes HTML:', nodesHTML.length > 0 ? 'Success' : 'Empty');
                } 
                
                // Nếu không có dữ liệu nào, hiển thị thông báo trống
                if (!nodesHTML) {
                    console.log('No data found, showing empty state');
                    nodesHTML = `
                        <div class="empty-state">
                            <div class="icon">🍂</div>
                            <h2>Chưa có dữ liệu</h2>
                            <p>Hãy thêm việc muốn làm hoặc đồ muốn mua để bắt đầu!</p>
                        </div>
                    `;
                }
                
                trunkElement.innerHTML = nodesHTML + loadingElement.outerHTML;
                
            } catch (error) {
                console.error('Error initializing bamboo nodes:', error);
                // Fallback: hiển thị thông báo lỗi
                const fallbackHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <h2>Lỗi tải dữ liệu</h2>
                        <p>Không thể tải timeline. Vui lòng thử lại sau.</p>
                    </div>
                `;
                trunkElement.innerHTML = fallbackHTML + loadingElement.outerHTML;
            }
        }

        // Khởi tạo timeline (không còn infinite scroll)
        document.addEventListener('DOMContentLoaded', function() {
            initializeBambooNodes();
            
            // Không cần scroll listener nữa vì timeline có giới hạn
            console.log('Timeline initialized with limited range based on actual data');
        });

        // Toggle trạng thái hoàn thành
        // Format giá tiền
        function formatPrice(price) {
            if (!price) return '';
            return parseInt(price).toLocaleString('vi-VN') + 'đ';
        }

        // Format giá tiền
        function formatPrice(price) {
            if (!price) return '';
            return parseInt(price).toLocaleString('vi-VN') + 'đ';
        }

        // Edit function đã được chuyển sang all-tasks.html và all-wishes.html
        // Dashboard chỉ hiển thị timeline tổng quan và toggle complete

        // Toggle trạng thái hoàn thành
        async function toggleComplete(type, id) {
            try {
                const res = await fetch('api/toggle-complete.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, id })
                });
                const json = await res.json();
                if (!json.success) throw new Error(json.message || 'Toggle failed');
                const selector = `.branch-item[data-type="${type}"][data-id="${id}"]`;
                document.querySelectorAll(selector).forEach(item => {
                    const tickBtn = item.querySelector('.tick-btn');
                    if (json.is_completed) {
                        item.classList.add('completed');
                        tickBtn.innerHTML = '✅';
                        tickBtn.title = type === 'task' ? 'Đánh dấu chưa hoàn thành' : 'Đánh dấu chưa mua';
                    } else {
                        item.classList.remove('completed');
                        tickBtn.innerHTML = '⭕';
                        tickBtn.title = type === 'task' ? 'Đánh dấu hoàn thành' : 'Đánh dấu đã mua';
                    }
                });
                setTimeout(loadDashboardStats, 300);
            } catch (e) {
                console.error(e);
                alert('Có lỗi xảy ra khi cập nhật');
            }
        }

        // Infinite scroll functionality đã được loại bỏ để tối ưu hiệu suất
        // Dashboard chỉ hiển thị timeline overview, chi tiết sẽ xem trong các trang riêng
        function setupInfiniteScroll() {

        // Tạo lá rơi (tương tự index.html)
        function createFallingLeaf() {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            
            leaf.style.left = Math.random() * 100 + '%';
            const fallDuration = Math.random() * 3 + 4;
            leaf.style.animationDuration = fallDuration + 's';
            leaf.style.animationDelay = Math.random() * 2 + 's';
            
            document.querySelector('.falling-leaves').appendChild(leaf);
            
            setTimeout(() => {
                leaf.remove();
            }, (fallDuration + 2) * 1000);

        window.addEventListener('load', startFallingLeaves);

        for (let i = 0; i < 10; i++) {

        // Thêm task mới
        // Hàm hiển thị thông báo đẹp theo phong cách mùa thu
        function showNotification(message, type = 'info') {
            // Xóa notification cũ nếu có
            const existingNotification = document.querySelector('.notification');
            if (existingNotification) {
                existingNotification.remove();
            }
            
            // Tạo notification element
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            // Animate in với delay nhỏ để CSS có thể apply
            setTimeout(() => {
                notification.classList.add('show');
            }, 50);
            
            // Auto remove after 4 seconds
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 400);
            }, 4000);
        }

        }

        function viewAllWishes() {
            // Chuyển sang trang danh sách tất cả đồ muốn mua  
            window.location.href = 'all-wishes.html?user=' + encodeURIComponent(getUsername());
        }

        function logout() {
            showLogoutModal();
        }

        function showLogoutModal() {
            document.getElementById('logout-backdrop').style.display = 'block';
        }

        function hideLogoutModal() {
            document.getElementById('logout-backdrop').style.display = 'none';
        }

        function confirmLogout() {
            localStorage.removeItem('username');
            window.location.href = 'login.html';
        }

        // Đóng modal khi click vào backdrop
        document.addEventListener('DOMContentLoaded', function() {
            const backdrop = document.getElementById('logout-backdrop');
            if (backdrop) {
                backdrop.addEventListener('click', function(e) {
                    if (e.target === this) {
                        hideLogoutModal();
                    }
                });
            }
        });

        // Load dashboard stats from API
        async function loadDashboardStats() {
            try {
                const username = getUsername();
                const response = await fetch(`api/get-dashboard-stats.php?username=${encodeURIComponent(username)}`);
                const result = await response.json();
                
                if (result.success) {
                    updateDashboardStats(result.data);
                } else {
                    console.error('Error loading dashboard stats:', result.message);
                }
            } catch (error) {
                console.error('Error loading dashboard stats:', error);
            }
        }

        // Update dashboard stats display
        function updateDashboardStats(stats) {
            // Update stats cards
            const totalItemsEl = document.getElementById('total-items');
            const completedItemsEl = document.getElementById('completed-items');
            const pendingItemsEl = document.getElementById('pending-items');
            const completionRateEl = document.getElementById('completion-rate');

            if (totalItemsEl) totalItemsEl.textContent = stats.overall.total_items;
            if (completedItemsEl) completedItemsEl.textContent = stats.overall.completed_items;
            if (pendingItemsEl) pendingItemsEl.textContent = stats.overall.total_items - stats.overall.completed_items;
            if (completionRateEl) completionRateEl.textContent = stats.overall.overall_completion_rate + '%';

            // Add animations
            animateCounter(totalItemsEl, stats.overall.total_items);
            animateCounter(completedItemsEl, stats.overall.completed_items);
            animateCounter(pendingItemsEl, stats.overall.total_items - stats.overall.completed_items);

            console.log('Dashboard Stats Updated:', stats);
        }

        // Animate counter numbers
        function animateCounter(element, targetValue, duration = 1000) {
            if (!element || targetValue === 0) return;
            
            const startValue = 0;
            const startTime = performance.now();

            function updateCounter(currentTime) {
                const elapsedTime = currentTime - startTime;
                const progress = Math.min(elapsedTime / duration, 1);
                
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const currentValue = Math.round(startValue + (targetValue - startValue) * easeOut);
                
                if (element.id === 'completion-rate') {
                    element.textContent = currentValue + '%';
                } else {
                    element.textContent = currentValue;
                }

                if (progress < 1) {
                    requestAnimationFrame(updateCounter);
                }
            }

            requestAnimationFrame(updateCounter);
        }

        // Load recent dashboard items
        async function loadDashboardItems(type = 'both', status = 'all', limit = 10) {
            try {
                const username = getUsername();
                const response = await fetch(`api/get-dashboard-items.php?username=${encodeURIComponent(username)}&type=${type}&status=${status}&limit=${limit}`);
                const result = await response.json();
                
                if (result.success) {
                    return result.data;
                } else {
                    console.error('Error loading dashboard items:', result.message);
                    return null;
                }
            } catch (error) {
                console.error('Error loading dashboard items:', error);
                return null;
            }
        }

        // Refresh dashboard data
        async function refreshDashboardData() {
            console.log('Refreshing dashboard data...');
            
            // Load stats
            await loadDashboardStats();
            
            // Load recent items
            const items = await loadDashboardItems('both', 'all', 20);
            if (items) {
                console.log('Recent items:', items);
                // Could update sidebar or other parts with recent items
            }

            // Reload timeline data
            timelineData = {}; // Clear cache
            await initializeBambooNodes();
        }

        // Chỉ refresh timeline + (tuỳ chọn) stats
        async function refreshTimeline(includeStats = false) {
            if (includeStats) {
                await loadDashboardStats();
            }
            timelineData = {};
            await initializeBambooNodes();
        }

        // Auto refresh every 30 seconds
        function startAutoRefresh() {
            setInterval(refreshDashboardData, 30000); // 30 seconds
        }

        // Initialize dashboard when page loads
        document.addEventListener('DOMContentLoaded', function() {
            // Load stats + timeline once
            refreshTimeline(true);
            // Start auto refresh (keeps stats + timeline fresh)
            startAutoRefresh();
        });

        // Kiểm tra đăng nhập (đơn giản)
        if (!username || username === 'User') {
            // Có thể redirect về trang login nếu chưa đăng nhập
            console.warn('No valid username found, using default');
        }
    </script>
