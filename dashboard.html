<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Dòng thời gian cá nhân</title>
    <!-- Font web hỗ trợ tiếng Việt -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;600;700&display=swap&subset=vietnamese" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Merriweather', 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(135deg, #ff9a56 0%, #ff6b35 50%, #f7931e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animation cho lá rơi */
        .falling-leaves {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .leaf {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #f4a261;
            border-radius: 0 100% 0 100%;
            animation: fall linear infinite;
            opacity: 0.7;
        }

        .leaf:nth-child(odd) {
            background: #e76f51;
            border-radius: 100% 0 100% 0;
            transform: rotate(15deg);
        }

        .leaf:nth-child(3n) {
            background: #e9c46a;
            width: 15px;
            height: 15px;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Header cố định */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
            border-bottom: 2px solid rgba(233, 196, 106, 0.3);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .welcome {
            font-size: 1.5rem;
            color: #8b4513;
            font-weight: 600;
        }

        .logout-btn {
            background: linear-gradient(135deg, #e76f51, #f4a261);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 111, 81, 0.4);
        }

        /* Modal đăng xuất */
        .logout-modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logout-modal-content {
            position: relative;
            background: linear-gradient(145deg, #fff 0%, #fef7f0 100%);
            padding: 35px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 90%;
            text-align: center;
            font-family: 'Merriweather', 'Georgia', 'Times New Roman', serif;
            border: 2px solid rgba(231, 111, 81, 0.2);
            animation: modalSlideIn 0.3s ease-out;
            margin: auto;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logout-modal-content h3 {
            color: #e76f51;
            margin-bottom: 15px;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .logout-modal-content p {
            color: #8b4513;
            margin-bottom: 25px;
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .logout-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-logout-confirm,
        .btn-logout-cancel {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 130px;
            font-family: 'Merriweather', serif;
        }

        .btn-logout-confirm {
            background: linear-gradient(135deg, #e76f51, #f4a261);
            color: white;
            box-shadow: 0 5px 15px rgba(231, 111, 81, 0.3);
        }

        .btn-logout-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(231, 111, 81, 0.4);
        }

        .btn-logout-cancel {
            background: linear-gradient(135deg, #e9c46a, #f4a261);
            color: #8b4513;
            box-shadow: 0 5px 15px rgba(233, 196, 106, 0.3);
        }

        .btn-logout-cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 196, 106, 0.4);
        }

        @media (max-width: 480px) {
            .logout-modal-content {
                padding: 25px 20px;
                margin: 20px;
            }
            
            .logout-buttons {
                flex-direction: column;
            }
            
            .btn-logout-confirm,
            .btn-logout-cancel {
                width: 100%;
            }
        }

        /* Sidebar cố định */
        .sidebar {
            position: fixed;
            left: 0;
            top: 70px; /* Cách header */
            width: 280px;
            height: calc(100vh - 70px);
            background: linear-gradient(180deg, 
                rgba(255, 248, 240, 0.95) 0%, 
                rgba(255, 235, 205, 0.95) 50%, 
                rgba(255, 218, 185, 0.95) 100%);
            backdrop-filter: blur(15px);
            box-shadow: 2px 0 20px rgba(139, 69, 19, 0.15);
            z-index: 50;
            overflow-y: auto;
            padding: 20px;
            border-right: 2px solid rgba(231, 111, 81, 0.2);
        }

        .sidebar h3 {
            color: #8b4513;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.2rem;
        }

        .action-btn {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-add-task {
            background: linear-gradient(135deg, #e9c46a, #f4a261);
            color: #8b4513;
            box-shadow: 0 3px 10px rgba(233, 196, 106, 0.3);
        }

        .btn-add-wish {
            background: linear-gradient(135deg, #e76f51, #f4a261);
            color: white;
            box-shadow: 0 3px 10px rgba(231, 111, 81, 0.3);
        }

        .btn-view-tasks {
            background: linear-gradient(135deg, #2a9d8f, #43aa8b);
            color: white;
            box-shadow: 0 3px 10px rgba(42, 157, 143, 0.3);
        }

        .btn-view-wishes {
            background: linear-gradient(135deg, #f72585, #f77f00);
            color: white;
            box-shadow: 0 3px 10px rgba(247, 37, 133, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .sidebar-section {
            margin-bottom: 30px;
        }

        .sidebar-section h4 {
            color: #8b4513;
            font-size: 1rem;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(139, 69, 19, 0.2);
            padding-bottom: 5px;
        }

        .item-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .list-item {
            background: rgba(233, 196, 106, 0.1);
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 3px solid #e76f51;
            font-size: 0.85rem;
            color: #8b4513;
        }

        .list-item .date {
            font-size: 0.75rem;
            color: #d2691e;
            opacity: 0.8;
        }

        /* Main content */
        .main-content {
            margin-left: 280px;
            margin-top: 70px;
            padding: 30px;
            min-height: calc(100vh - 70px);
            position: relative;
            z-index: 2;
        }

        .content-area {
            background: linear-gradient(145deg, rgba(255, 248, 240, 0.95) 0%, rgba(255, 228, 196, 0.95) 100%);
            border-radius: 20px;
            padding: 40px;
            min-height: 600px;
            box-shadow: 0 10px 30px rgba(139, 69, 19, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(231, 111, 81, 0.2);
            position: relative;
            overflow: hidden;
        }

        .content-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(231, 111, 81, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(233, 196, 106, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(244, 162, 97, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .content-area::after {
            content: '🍂 🍁 🌰 🍂 🍁 🌰 🍂 🍁 🌰';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            font-size: 1.5rem;
            opacity: 0.3;
            text-align: center;
            pointer-events: none;
            z-index: 1;
            animation: gentleFloat 6s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .empty-state {
            text-align: center;
            color: #8b4513;
            font-size: 1.1rem;
            margin-top: 100px;
            position: relative;
            z-index: 2;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.7;
            color: #e76f51;
        }

        .empty-state h2 {
            color: #e76f51;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        .empty-state p {
            color: #d2691e;
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Cây tre timeline */
        .bamboo-timeline {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 500px;
            padding: 20px;
            overflow: hidden;
        }

        .bamboo-scroll-container {
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
        }

        .bamboo-scroll-container::-webkit-scrollbar {
            width: 6px;
        }

        .bamboo-scroll-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        .bamboo-scroll-container::-webkit-scrollbar-thumb {
            background: rgba(231, 111, 81, 0.5);
            border-radius: 3px;
        }

        .bamboo-scroll-container::-webkit-scrollbar-thumb:hover {
            background: rgba(231, 111, 81, 0.7);
        }

        .bamboo-tree {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 800px;
            width: 100%;
        }

        .bamboo-root {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .current-time {
            background: linear-gradient(135deg, #e76f51, #f4a261);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(231, 111, 81, 0.3);
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .root-decoration {
            font-size: 1.5rem;
            animation: sway 3s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .bamboo-trunk {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .bamboo-trunk::before {
            content: '';
            position: absolute;
            left: 50%;
            top: -10px;
            bottom: -10px;
            width: 8px;
            background: linear-gradient(180deg, #d4a574 0%, #c4955a 50%, #b8894a 100%);
            transform: translateX(-50%);
            border-radius: 4px;
            box-shadow: inset 0 0 5px rgba(139, 69, 19, 0.3);
        }

        .bamboo-node {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            z-index: 2;
        }

        .bamboo-node::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #e9c46a, #f4a261);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border: 3px solid #d4a574;
            box-shadow: 0 3px 10px rgba(139, 69, 19, 0.2);
        }

        .bamboo-node.today::before {
            background: linear-gradient(135deg, #e76f51, #f4a261);
            width: 25px;
            height: 25px;
            animation: todayPulse 2s infinite;
        }

        .bamboo-node.future::before {
            background: linear-gradient(135deg, #2a9d8f, #43aa8b);
            width: 22px;
            height: 22px;
            animation: futurePulse 3s infinite;
        }

        @keyframes futurePulse {
            0%, 100% { box-shadow: 0 3px 10px rgba(139, 69, 19, 0.2); }
            50% { box-shadow: 0 5px 20px rgba(42, 157, 143, 0.5); }
        }

        .bamboo-loading {
            text-align: center;
            padding: 30px 20px;
            color: #d2691e;
            opacity: 0.7;
        }

        .loading-text {
            font-size: 1rem;
            animation: loadingFloat 2s ease-in-out infinite;
        }

        @keyframes loadingFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes todayPulse {
            0%, 100% { box-shadow: 0 3px 10px rgba(139, 69, 19, 0.2); }
            50% { box-shadow: 0 5px 20px rgba(231, 111, 81, 0.5); }
        }

        .node-date {
            position: absolute;
            left: 50%;
            top: -15px;
            transform: translateX(-50%);
            background: rgba(255, 248, 240, 0.9);
            color: #8b4513;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(231, 111, 81, 0.3);
        }

        .node-branches {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            gap: 100px;
        }

        .task-branch, .wish-branch {
            position: relative;
            flex: 1;
            max-width: 200px;
        }

        .task-branch {
            text-align: right;
        }

        .wish-branch {
            text-align: left;
        }

        .task-branch::before {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #2a9d8f, #43aa8b);
            transform: translateY(-50%);
            border-radius: 2px;
        }

        .wish-branch::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #f72585, #f77f00);
            transform: translateY(-50%);
            border-radius: 2px;
        }

        .branch-content {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 15px;
            box-shadow: 0 3px 10px rgba(139, 69, 19, 0.15);
            border: 1px solid rgba(231, 111, 81, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .branch-content.completed {
            opacity: 0.7;
            background: rgba(200, 200, 200, 0.8);
        }

        .branch-content.completed .branch-text {
            text-decoration: line-through;
            color: #888;
        }

        .tick-btn {
            background: rgba(42, 157, 143, 0.8);
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            color: white;
            flex-shrink: 0;
        }

        .tick-btn:hover {
            background: rgba(42, 157, 143, 1);
            transform: scale(1.1);
        }

        .branch-content.completed .tick-btn {
            background: rgba(231, 111, 81, 0.8);
        }

        .branch-content.completed .tick-btn:hover {
            background: rgba(231, 111, 81, 1);
        }

        .tick-icon {
            font-weight: bold;
            font-size: 12px;
        }

        .task-branch .branch-content {
            margin-right: 50px;
            border-left: 3px solid #2a9d8f;
        }

        .wish-branch .branch-content {
            margin-left: 50px;
            border-left: 3px solid #f72585;
        }

        .branch-content:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.25);
        }

        .branch-text {
            font-size: 0.9rem;
            color: #8b4513;
            font-weight: 500;
        }

        .loading-indicator {
            text-align: center;
            padding: 20px;
            color: #d2691e;
            font-style: italic;
        }

        .loading-text {
            font-size: 1rem;
            animation: loadingPulse 1.5s infinite;
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .node-branches {
                flex-direction: column;
                gap: 20px;
            }
            
            .task-branch, .wish-branch {
                text-align: center;
                max-width: 250px;
            }
            
            .task-branch .branch-content,
            .wish-branch .branch-content {
                margin: 0;
            }
            
            .task-branch::before,
            .wish-branch::before {
                display: none;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                top: 0;
            }
            
            .main-content {
                margin-left: 0;
                margin-top: 0;
            }
            
            .header-content {
                flex-direction: column;
                gap: 10px;
            }
            
            .welcome {
                font-size: 1.2rem;
            }
        }

        /* Scrollbar custom */
        .sidebar::-webkit-scrollbar, .item-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .sidebar::-webkit-scrollbar-track, .item-list::-webkit-scrollbar-track {
            background: rgba(233, 196, 106, 0.1);
            border-radius: 3px;
        }
        
        .sidebar::-webkit-scrollbar-thumb, .item-list::-webkit-scrollbar-thumb {
            background: rgba(231, 111, 81, 0.5);
            border-radius: 3px;
        }
        
        .sidebar::-webkit-scrollbar-thumb:hover, .item-list::-webkit-scrollbar-thumb:hover {
            background: rgba(231, 111, 81, 0.7);
        }
    </style>
</head>
<body>
    <!-- Lá rơi animation -->
    <div class="falling-leaves">
        <!-- Lá sẽ được tạo bằng JavaScript -->
    </div>

    <!-- Header cố định -->
    <header class="header">
        <div class="header-content">
            <h1 class="welcome">🍂 Xin chào, <span id="username">User</span>!</h1>
            <button class="logout-btn" onclick="logout()">🚪 Đăng xuất</button>
        </div>
    </header>

    <!-- Sidebar cố định -->
    <aside class="sidebar">
        <h3>📋 Tác vụ</h3>
        
        <button class="action-btn btn-add-task" onclick="openAddTask()">
            ✅ Thêm việc muốn làm
        </button>
        
        <button class="action-btn btn-add-wish" onclick="openAddWish()">
            🛒 Thêm đồ muốn mua
        </button>

        <button class="action-btn btn-view-tasks" onclick="viewAllTasks()">
            📝 Xem tất cả việc muốn làm
        </button>

        <button class="action-btn btn-view-wishes" onclick="viewAllWishes()">
            🛍️ Xem tất cả đồ muốn mua
        </button>
    </aside>

    <!-- Main content -->
    <main class="main-content">
        <div class="content-area">
            <div class="bamboo-timeline">
                <!-- Container có thể cuộn -->
                <div class="bamboo-scroll-container" id="bamboo-container">
                    <!-- Gốc tre với thời gian hiện tại ở trên cùng -->
                    <div class="bamboo-root">
                        <div class="root-decoration">🌱</div>
                        <div class="current-time" id="current-time">
                            <!-- Thời gian sẽ được cập nhật bằng JavaScript -->
                        </div>
                    </div>
                    
                    <!-- Thân tre với các đốt -->
                    <div class="bamboo-trunk" id="bamboo-trunk">
                        <!-- Các đốt sẽ được tạo bằng JavaScript -->
                        <div class="loading-indicator" id="loading" style="display: none;">
                            <div class="loading-text">Đang tải thêm ngày... 🍂</div>
                        </div>
                    </div>
                </div>
            </div>
                        <!-- Đốt hôm nay -->
                        <div class="bamboo-node today">
                            <div class="node-date">Hôm nay</div>
                            <div class="node-branches">
                                <div class="branch-left task-branch">
                                    <div class="branch-content">
                                        <span class="branch-icon">�</span>
                                        <span class="branch-text">Học tiếng Anh</span>
                                    </div>
                                </div>
                                <div class="branch-right wish-branch">
                                    <div class="branch-content">
                                        <span class="branch-icon">🛒</span>
                                        <span class="branch-text">Laptop mới</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Đốt hôm qua -->
                        <div class="bamboo-node yesterday">

    <script>
        // Lấy username từ localStorage hoặc URL params (tạm thời)
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('user') || localStorage.getItem('username') || 'User';
        document.getElementById('username').textContent = username;

        // Cập nhật thời gian hiện tại
        function updateCurrentTime() {
            const now = new Date();
            const options = {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            const timeString = now.toLocaleDateString('vi-VN', options);
            const currentTimeElement = document.getElementById('current-time');
            if (currentTimeElement) {
                currentTimeElement.textContent = timeString;
            }
        }

        // Cập nhật thời gian mỗi giây
        setInterval(updateCurrentTime, 1000);
        updateCurrentTime(); // Gọi ngay lập tức

        // Dữ liệu timeline từ API
        let timelineData = {};
        let dayOffset = 20; // Số ngày từ hôm nay
        let isLoading = false;

        // Tải dữ liệu timeline từ API
        async function loadTimelineData(startDate, endDate) {
            try {
                const username = localStorage.getItem('username') || 'User';
                const response = await fetch(`api/get-timeline.php?username=${encodeURIComponent(username)}&start_date=${startDate}&end_date=${endDate}`);
                const result = await response.json();
                
                if (result.success) {
                    // Lưu dữ liệu vào cache
                    result.data.forEach(dayData => {
                        timelineData[dayData.date] = dayData;
                    });
                    return result.data;
                } else {
                    console.error('Error loading timeline data:', result.message);
                    return [];
                }
            } catch (error) {
                console.error('Error loading timeline data:', error);
                return [];
            }
        }

        // Tạo một đốt tre cho một ngày cụ thể với dữ liệu thực tế
        function createBambooNode(daysFromToday, dayData = null) {
            const date = new Date();
            date.setDate(date.getDate() + daysFromToday);
            const dateString = date.toISOString().split('T')[0];
            
            let dateLabel;
            if (daysFromToday === 0) {
                dateLabel = 'Hôm nay';
            } else if (daysFromToday === 1) {
                dateLabel = 'Ngày mai';
            } else if (daysFromToday === -1) {
                dateLabel = 'Hôm qua';
            } else if (daysFromToday > 1) {
                dateLabel = `${daysFromToday} ngày nữa`;
            } else {
                dateLabel = `${Math.abs(daysFromToday)} ngày trước`;
            }

            const nodeClass = daysFromToday === 0 ? 'today' : 
                             daysFromToday > 0 ? 'future' : '';

            // Sử dụng dữ liệu thực tế hoặc dữ liệu từ cache
            let tasks = [];
            let wishes = [];

            if (dayData) {
                tasks = dayData.tasks || [];
                wishes = dayData.wishes || [];
            } else if (timelineData[dateString]) {
                tasks = timelineData[dateString].tasks || [];
                wishes = timelineData[dateString].wishes || [];
            }

            // Tạo HTML cho tasks
            let tasksHTML = '';
            if (tasks.length > 0) {
                tasks.forEach(task => {
                    const completedClass = task.is_completed ? 'completed' : '';
                    tasksHTML += `
                        <div class="branch-item ${completedClass}">
                            <span class="branch-text">${task.title}</span>
                            <button class="tick-btn" onclick="toggleComplete('task', ${task.id})" 
                                    title="${task.is_completed ? 'Đánh dấu chưa hoàn thành' : 'Đánh dấu hoàn thành'}">
                                ${task.is_completed ? '✅' : '⭕'}
                            </button>
                        </div>
                    `;
                });
            } else {
                tasksHTML = '<div class="branch-item empty">Chưa có việc nào</div>';
            }

            // Tạo HTML cho wishes
            let wishesHTML = '';
            if (wishes.length > 0) {
                wishes.forEach(wish => {
                    const completedClass = wish.is_completed ? 'completed' : '';
                    const priceText = wish.price ? ` (${formatPrice(wish.price)})` : '';
                    wishesHTML += `
                        <div class="branch-item ${completedClass}">
                            <span class="branch-text">${wish.title}${priceText}</span>
                            <button class="tick-btn" onclick="toggleComplete('wish', ${wish.id})"
                                    title="${wish.is_completed ? 'Đánh dấu chưa mua' : 'Đánh dấu đã mua'}">
                                ${wish.is_completed ? '✅' : '⭕'}
                            </button>
                        </div>
                    `;
                });
            } else {
                wishesHTML = '<div class="branch-item empty">Chưa có đồ nào</div>';
            }

            return `
                <div class="bamboo-node ${nodeClass}">
                    <div class="node-date">${dateLabel}</div>
                    <div class="node-branches">
                        <div class="branch-left task-branch">
                            <div class="branch-content">
                                ${tasksHTML}
                            </div>
                        </div>
                        <div class="branch-right wish-branch">
                            <div class="branch-content">
                                ${wishesHTML}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Tạo nhiều đốt tre ban đầu
        async function initializeBambooNodes() {
            const trunkElement = document.getElementById('bamboo-trunk');
            const loadingElement = document.getElementById('loading');
            
            try {
                // Load dữ liệu timeline từ API
                await loadTimelineData(-10, 20);
                
                // Tạo đốt từ 10 ngày trước đến 20 ngày nữa
                let nodesHTML = '';
                for (let i = -10; i <= 20; i++) {
                    const date = new Date();
                    date.setDate(date.getDate() + i);
                    const dateString = date.toISOString().split('T')[0];
                    const dayData = timelineData[dateString];
                    
                    nodesHTML += createBambooNode(i, dayData);
                }
                
                trunkElement.innerHTML = nodesHTML + loadingElement.outerHTML;
                dayOffset = 20; // Cập nhật offset hiện tại
            } catch (error) {
                console.error('Error initializing bamboo nodes:', error);
                // Fallback: tạo nodes rỗng
                let nodesHTML = '';
                for (let i = -10; i <= 20; i++) {
                    nodesHTML += createBambooNode(i);
                }
                trunkElement.innerHTML = nodesHTML + loadingElement.outerHTML;
                dayOffset = 20;
            }
        }

        // Thêm nhiều đốt hơn khi cuộn
        async function loadMoreNodes() {
            if (isLoading) return;
            
            isLoading = true;
            const loadingElement = document.getElementById('loading');
            loadingElement.style.display = 'block';
            
            try {
                // Load dữ liệu cho 10 ngày tiếp theo
                await loadTimelineData(dayOffset + 1, dayOffset + 10);
                
                const trunkElement = document.getElementById('bamboo-trunk');
                let newNodesHTML = '';
                
                // Thêm 10 ngày nữa
                for (let i = 1; i <= 10; i++) {
                    const date = new Date();
                    date.setDate(date.getDate() + dayOffset + i);
                    const dateString = date.toISOString().split('T')[0];
                    const dayData = timelineData[dateString];
                    
                    newNodesHTML += createBambooNode(dayOffset + i, dayData);
                }
                
                // Thêm vào trước loading indicator
                loadingElement.insertAdjacentHTML('beforebegin', newNodesHTML);
                dayOffset += 10;
                
                setTimeout(() => {
                    loadingElement.style.display = 'none';
                    isLoading = false;
                }, 500);
            } catch (error) {
                console.error('Error loading more nodes:', error);
                loadingElement.style.display = 'none';
                isLoading = false;
            }
        }

        // Xử lý scroll event
        function handleScroll() {
            const container = document.getElementById('bamboo-container');
            const scrollTop = container.scrollTop;
            const scrollHeight = container.scrollHeight;
            const clientHeight = container.clientHeight;
            
            // Khi cuộn gần đến cuối
            if (scrollTop + clientHeight >= scrollHeight - 100) {
                loadMoreNodes();
            }
        }

        // Khởi tạo timeline
        document.addEventListener('DOMContentLoaded', function() {
            initializeBambooNodes();
            
            const container = document.getElementById('bamboo-container');
            if (container) {
                container.addEventListener('scroll', handleScroll);
            }
        });

        // Toggle trạng thái hoàn thành
        // Format giá tiền
        function formatPrice(price) {
            if (!price) return '';
            return parseInt(price).toLocaleString('vi-VN') + 'đ';
        }

        // Format giá tiền
        function formatPrice(price) {
            if (!price) return '';
            return parseInt(price).toLocaleString('vi-VN') + 'đ';
        }

        // Toggle trạng thái hoàn thành
        async function toggleComplete(type, id) {
            try {
                const response = await fetch('api/toggle-complete.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ type: type, id: id })
                });

                const result = await response.json();
                
                if (result.success) {
                    // Tìm và cập nhật UI
                    const branchItems = document.querySelectorAll('.branch-item');
                    branchItems.forEach(item => {
                        const tickBtn = item.querySelector('.tick-btn');
                        if (tickBtn && tickBtn.onclick.toString().includes(`'${type}', ${id}`)) {
                            if (result.is_completed) {
                                item.classList.add('completed');
                                tickBtn.innerHTML = '✅';
                                tickBtn.title = type === 'task' ? 'Đánh dấu chưa hoàn thành' : 'Đánh dấu chưa mua';
                            } else {
                                item.classList.remove('completed');
                                tickBtn.innerHTML = '⭕';
                                tickBtn.title = type === 'task' ? 'Đánh dấu hoàn thành' : 'Đánh dấu đã mua';
                            }
                        }
                    });
                } else {
                    alert('Có lỗi xảy ra: ' + (result.message || 'Không thể cập nhật'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Có lỗi xảy ra khi cập nhật');
            }
        }

        // Infinite scroll functionality
        let loadedMonths = 1; // Đã load 1 tháng
        const maxMonths = 12; // Tối đa 1 năm

        function loadMoreBambooNodes() {
            const bambooTrunk = document.querySelector('.bamboo-trunk');
            const loadingElement = document.getElementById('bamboo-loading');
            
            if (loadedMonths >= maxMonths) {
                loadingElement.style.display = 'none';
                return;
            }

            // Tạo thêm các đốt cho tháng tiếp theo
            const monthsAgo = loadedMonths + 1;
            const monthNames = [
                'tháng trước', '2 tháng trước', '3 tháng trước', '4 tháng trước',
                '5 tháng trước', '6 tháng trước', '7 tháng trước', '8 tháng trước',
                '9 tháng trước', '10 tháng trước', '11 tháng trước', '1 năm trước'
            ];

            const tasks = [
                'Học JavaScript', 'Tập yoga', 'Viết nhật ký', 'Đọc sách văn học',
                'Học Photoshop', 'Chạy bộ', 'Nấu ăn', 'Học thiền',
                'Chơi piano', 'Vẽ tranh', 'Học tiếng Nhật', 'Làm vườn'
            ];

            const wishes = [
                'iPad Pro', 'Apple Watch', 'Máy ảnh Canon', 'Xe đạp thể thao',
                'Túi xách LV', 'Giày sneaker', 'Đàn guitar', 'Kính râm',
                'Máy PS5', 'Smart TV', 'Điện thoại Samsung', 'Laptop gaming'
            ];

            const newNode = document.createElement('div');
            newNode.className = 'bamboo-node';
            newNode.innerHTML = `
                <div class="node-date">${monthNames[loadedMonths - 1]}</div>
                <div class="node-branches">
                    <div class="branch-left task-branch">
                        <div class="branch-content">
                            <span class="branch-text">${tasks[Math.floor(Math.random() * tasks.length)]}</span>
                        </div>
                    </div>
                    <div class="branch-right wish-branch">
                        <div class="branch-content">
                            <span class="branch-text">${wishes[Math.floor(Math.random() * wishes.length)]}</span>
                        </div>
                    </div>
                </div>
            `;

            bambooTrunk.insertBefore(newNode, loadingElement);
            loadedMonths++;
        }

        // Thêm scroll listener cho infinite scroll
        function setupInfiniteScroll() {
            const scrollContainer = document.querySelector('.bamboo-scroll-container');
            if (!scrollContainer) return;

            scrollContainer.addEventListener('scroll', function() {
                const { scrollTop, scrollHeight, clientHeight } = scrollContainer;
                
                // Nếu cuộn gần đến cuối (còn 100px)
                if (scrollTop + clientHeight >= scrollHeight - 100) {
                    loadMoreBambooNodes();
                }
            });
        }

        // Khởi tạo khi trang load
        setupInfiniteScroll();

        // Tạo lá rơi (tương tự index.html)
        function createFallingLeaf() {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            
            leaf.style.left = Math.random() * 100 + '%';
            const fallDuration = Math.random() * 3 + 4;
            leaf.style.animationDuration = fallDuration + 's';
            leaf.style.animationDelay = Math.random() * 2 + 's';
            
            document.querySelector('.falling-leaves').appendChild(leaf);
            
            setTimeout(() => {
                leaf.remove();
            }, (fallDuration + 2) * 1000);
        }

        function startFallingLeaves() {
            setInterval(createFallingLeaf, 300);
        }

        window.addEventListener('load', startFallingLeaves);

        for (let i = 0; i < 10; i++) {
            setTimeout(createFallingLeaf, i * 200);
        }

        // Các functions tác vụ (sẽ implement sau)
        function openAddTask() {
            alert('Chức năng thêm việc muốn làm sẽ được phát triển tiếp!');

        function openAddWish() {

        function viewAllTasks() {
            // Chuyển sang trang danh sách tất cả việc muốn làm
            window.location.href = 'tasks.html';
        }

        function viewAllWishes() {
            // Chuyển sang trang danh sách tất cả đồ muốn mua  
            window.location.href = 'wishes.html';
        }

        function logout() {
            showLogoutModal();
        }

        function showLogoutModal() {
            document.getElementById('logout-backdrop').style.display = 'block';
        }

        function hideLogoutModal() {
            document.getElementById('logout-backdrop').style.display = 'none';
        }

        function confirmLogout() {
            localStorage.removeItem('username');
            window.location.href = 'index.html';
        }

        // Đóng modal khi click vào backdrop
        document.addEventListener('DOMContentLoaded', function() {
            const backdrop = document.getElementById('logout-backdrop');
            if (backdrop) {
                backdrop.addEventListener('click', function(e) {
                    if (e.target === this) {
                        hideLogoutModal();
                    }
                });
            }
        });

        // Kiểm tra đăng nhập (đơn giản)
        if (!username || username === 'User') {
            // Có thể redirect về trang login nếu chưa đăng nhập
        }
    </script>
